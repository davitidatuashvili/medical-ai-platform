{% extends "base.html" %}
{% block body %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="logo center"><span>AI</span> Medical AI</div>
    <h1>შესვლა</h1>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}<div class="flash {{ category }}">{{ message }}</div>{% endfor %}
    {% endwith %}
    <form method="post">

      <label>ელფოსტა<input type="email" name="email" required></label>
      <label>პაროლი<input type="password" name="password" minlength="6" required></label>
      <button class="primary-btn full" type="submit">შესვლა</button>
    </form>
    <p class="muted">არ გაქვს ანგარიში? <a href="/register">რეგისტრაცია</a></p>
  </div>
</div>
{% endblock %}
